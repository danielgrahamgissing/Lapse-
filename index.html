<!doctype html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lapse</title>
<meta name="theme-color" content="#061A20">
<meta name="color-scheme" content="dark">
<meta name="supported-color-schemes" content="dark">

<!-- Installable app (Add to Home Screen) -->
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lapse">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<style>
  /* Dark is the only theme. Declaring the scheme stops the browser's own
     dark/light feature from treating this as a light page and offering a
     toggle that would invert the colours. */
  :root{ color-scheme: dark; }
  html{ color-scheme: dark; }
  :root{
    --abyss:#0A2E36; --deep:#0B2A31; --aqua:#2DBFC4; --mint:#5EE7D0;
    --moss:#2F6B5A; --ember:#D9663D; --sun:#E0A93B;
    --lumin:#8FF0B6; --lumin-soft:rgba(143,240,182,.42); --lumin-dim:rgba(143,240,182,.13);
    --lumin-text:#8FF0B6;
    --ink:#E8F6F5; --paper:#08222A;
    --card:rgba(18,52,60,.72); --line:transparent; --muted:rgba(232,246,245,.66);
    --faint:rgba(232,246,245,.55);
    --cardglow:0 10px 34px -16px rgba(0,0,0,.8), 0 1px 0 rgba(143,240,182,.22) inset;
    --lumtrim:1px solid rgba(143,240,182,.28);
    --pagebg:#061A20;
    --pageglow:radial-gradient(900px 520px at 50% -8%, rgba(45,191,196,.26) 0%, rgba(45,191,196,0) 62%),
               radial-gradient(620px 420px at 108% 8%, rgba(94,231,208,.12) 0%, rgba(94,231,208,0) 60%),
               radial-gradient(700px 560px at -12% 92%, rgba(27,127,135,.22) 0%, rgba(27,127,135,0) 62%);
    --inputbg:#0B2A31;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI",Roboto,-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;
    background:var(--pageglow), var(--pagebg);
    background-attachment:fixed;
    min-height:100vh; display:flex; align-items:stretch; justify-content:center;
    padding:0; -webkit-font-smoothing:antialiased;
  }
  /* No frame: the app fills the screen and the aqua gradient shows through.
     Cards and headers provide the structure instead of a border. */
  .phone{
    width:100%; max-width:520px; min-height:100vh; background:transparent;
    overflow:hidden; position:relative; display:flex; flex-direction:column;
  }
  .serif{font-family:Georgia,"Times New Roman",serif}
  .tnum{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}

  /* header */
  .hdr{background:var(--deep);color:#fff;padding:24px 24px 32px;border-radius:0 0 30px 30px;position:relative;overflow:hidden}
  .glow{position:absolute;top:-80px;right:-48px;width:256px;height:256px;border-radius:50%;
        background:radial-gradient(circle,#5EE7D0 0%,transparent 70%);opacity:.35;pointer-events:none}
  .hdr>*{position:relative}
  .hdr>.glow{position:absolute}
  .brandrow{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:8px}
  .brand span{font-family:Georgia,serif;font-size:17px;font-weight:600;letter-spacing:-.01em}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.18em;font-weight:700}
  .datestr{color:rgba(255,255,255,.4);margin-top:20px}
  .iconbtn{padding:8px;border-radius:8px;color:rgba(255,255,255,.5)}
  .iconbtn:hover{color:#fff}

  .hero{display:block;width:100%;text-align:left;margin-top:8px}
  .hero .lbl{color:#7FD9D6}
  .hero .num{font-family:Georgia,serif;font-size:76px;line-height:.85;font-weight:600;font-variant-numeric:tabular-nums}
  .hero .unit{color:rgba(255,255,255,.55);font-size:14px;font-weight:500;padding-bottom:6px}
  .hero .row2{display:flex;align-items:center;gap:8px;margin-top:12px}
  .hero .chip{padding:6px;border-radius:8px;background:rgba(255,255,255,.1);display:flex}
  .hero .nm{font-family:Georgia,serif;font-size:19px}
  .hero .dt{color:rgba(255,255,255,.4);font-size:14px}

  .warn{margin-top:20px;display:flex;align-items:center;gap:8px;background:rgba(217,102,61,.18);
        border:1px solid rgba(217,102,61,.35);border-radius:12px;padding:8px 12px}
  .warn i{width:6px;height:6px;border-radius:50%;background:#F0906A;display:block}
  .warn p{margin:0;font-size:13px;color:#F6C9B6}

  /* list */
  .body{flex:1;overflow-y:auto;padding:4px 16px 8px}
  .seclbl{display:inline-block;font-size:10.5px;text-transform:uppercase;letter-spacing:.16em;
          font-weight:700;color:#CFF3EF;margin:0 0 9px;padding:5px 11px;
          background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);
          border-radius:999px}
  .card{width:100%;display:flex;align-items:center;gap:12px;padding:12px;border-radius:16px;
        background:var(--card);border:1px solid var(--line);text-align:left;margin-bottom:6px;
        box-shadow:var(--cardglow)}
  .card:hover{border-color:rgba(45,191,196,.4)}
  .bar{width:3px;align-self:stretch;border-radius:3px}
  .cico{padding:8px;border-radius:12px;display:flex}
  .cmid{flex:1;min-width:0}
  .cname{display:block;font-weight:600;font-size:15px;color:var(--ink);
         white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .csub{display:block;font-size:12px;color:var(--muted);
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cnum{text-align:right;flex-shrink:0}
  .cnum b{display:block;font-family:Georgia,serif;font-size:19px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
  .cnum s{display:block;font-size:10px;color:var(--faint);margin-top:2px;text-decoration:none}

  .upsell{width:100%;text-align:left;padding:14px 16px;border-radius:18px;margin-top:14px;
          box-shadow:var(--cardglow);
          background:var(--card);border:1px solid rgba(45,191,196,.35)}
  .upsell p{margin:0}
  .upsell .t{font-size:14px;font-weight:600;color:var(--ink)}
  .upsell .s{font-size:13px;color:var(--muted);margin-top:2px}

  .foot{padding:12px 16px 20px}
  .btn{width:100%;border-radius:16px;padding:16px;font-weight:600;font-size:15px;
       display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-deep{background:var(--deep);color:#fff}
  .btn-deep:hover{background:#14505D}
  .btn-aqua{background:var(--aqua);color:#04262D;font-weight:700;
            box-shadow:0 6px 20px -8px rgba(45,191,196,.9)}
  .btn-aqua:hover{background:#26A8AD}
  .btn-moss{background:var(--moss);color:#fff}
  .btn-moss:hover{background:#285D4E}
  .btn:disabled{background:rgba(255,255,255,.08);color:rgba(232,246,245,.35);cursor:not-allowed;box-shadow:none}

  /* sub-screens */
  .tophdr{padding:12px 14px 8px;display:flex;align-items:center;gap:10px}
  .tophdr h1{flex:1;margin:0;font-family:Georgia,serif;font-size:18px;font-weight:600;color:#fff;text-align:center}
  .back{padding:8px;border-radius:10px;color:#fff;background:rgba(255,255,255,.1);
        display:flex;flex-shrink:0}
  .back:hover{background:rgba(255,255,255,.2)}
  .link{font-size:14px;font-weight:600;color:#1B7F87}

  .fld{margin-bottom:24px}
  .fld>label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.16em;
             font-weight:700;color:var(--faint);margin-bottom:8px}
  .inp{width:100%;background:var(--inputbg);border:1px solid rgba(127,231,168,.3);border-radius:12px;
       padding:12px 14px;font-size:15px;color:var(--ink)}
  .inp:focus{outline:none;border-color:var(--aqua);box-shadow:0 0 0 2px rgba(45,191,196,.35)}
  .inp.bad{border-color:var(--ember);box-shadow:0 0 0 2px rgba(217,102,61,.3)}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .cat3{display:flex;gap:10px;justify-content:center}
  .cat3 .catbtn{flex:1;max-width:120px}
  .catbtn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;
          border-radius:12px;font-size:11px;font-weight:600;background:var(--card);
          border:1px solid rgba(14,58,68,.08);color:var(--muted)}
  .catbtn.on{background:var(--deep);color:#fff;border-color:var(--deep)}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip2{padding:8px 14px;border-radius:999px;font-size:12px;font-weight:600;background:var(--card);
         border:1px solid rgba(14,58,68,.08);color:var(--muted)}
  .chip2.on{background:var(--aqua);color:#04262D;border-color:var(--aqua)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .hint{font-size:12.5px;color:var(--muted);line-height:1.55;background:var(--card);
        border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin:0}
  .remindgrid{display:flex;flex-direction:column;gap:8px}
  .remindchip{width:100%;display:flex;align-items:center;gap:11px;padding:12px 14px;
              border-radius:13px;background:var(--card);border:var(--lumtrim);
              font-size:14px;font-weight:600;color:var(--ink);text-align:left}
  .remindchip.on{border-color:var(--aqua);background:rgba(45,191,196,.14)}
  .rcheck{width:20px;height:20px;border-radius:6px;flex-shrink:0;display:flex;
          align-items:center;justify-content:center;border:1.5px solid var(--faint)}
  .remindchip.on .rcheck{background:var(--aqua);border-color:var(--aqua)}

  .dhead{display:flex;align-items:center;gap:12px;background:var(--card);
         border:var(--lumtrim);backdrop-filter:blur(8px);border-radius:18px;padding:14px 16px;
         box-shadow:var(--cardglow)}
  .dhead .ic{padding:12px;border-radius:16px;display:flex}
  .dhead h2{margin:0;font-family:Georgia,serif;font-size:23px;line-height:1.15;color:var(--ink)}
  .dhead p{margin:2px 0 0;font-size:13px;color:var(--muted)}
  .bigbox{margin-top:20px;border-radius:16px;padding:20px}
  .bigbox .n{font-family:Georgia,serif;font-size:56px;line-height:1;font-weight:600;font-variant-numeric:tabular-nums}
  .meta{margin-top:20px;border-radius:16px;background:var(--card);border:var(--lumtrim);padding:0 16px;box-shadow:var(--cardglow);backdrop-filter:blur(8px)}
  .meta div{display:flex;justify-content:space-between;align-items:center;padding:12px 0;
            border-bottom:1px solid var(--line)}
  .meta div:last-child{border-bottom:none}
  .meta dt{font-size:14px;color:var(--muted)}
  .meta dd{margin:0;font-size:14px;font-weight:600;color:var(--ink)}
  .danger{margin-top:20px;width:100%;display:flex;align-items:center;justify-content:center;
          gap:8px;font-size:14px;font-weight:600;color:#E08163;background:var(--card);
          border:1px solid var(--line);border-radius:16px;padding:13px}

  .panel{border-radius:16px;background:var(--card);border:var(--lumtrim);overflow:hidden;box-shadow:var(--cardglow);backdrop-filter:blur(8px)}
  .panel>*{border-bottom:1px solid var(--line)}
  .panel>*:last-child{border-bottom:none}
  .prow{width:100%;padding:14px 16px;display:flex;align-items:center;gap:12px;text-align:left}
  .prow .t{display:block;font-size:14px;font-weight:600;color:var(--ink)}
  .prow .s{display:block;font-size:12px;color:var(--muted)}
  .sw{width:44px;height:24px;border-radius:999px;background:rgba(14,58,68,.15);position:relative;flex-shrink:0}
  .sw.on{background:var(--aqua)}
  .sw i{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;
        background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:left .18s}
  .sw.on i{left:22px}

  .procard{border-radius:16px;background:var(--deep);color:#fff;padding:20px;position:relative;overflow:hidden}
  .freecard{border-radius:16px;background:var(--card);border:1px solid var(--line);padding:20px}

  /* two rows: language / nav / theme, then the centred logo beneath */
  .appbar{background:transparent;padding:8px 10px 6px;display:flex;
          flex-direction:column;gap:6px;position:relative;overflow:hidden;
          flex-shrink:0;min-height:0}
  .barrow{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .brandinline{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;min-width:0}
  .brandinline span{font-family:Georgia,serif;font-size:15px;font-weight:700;
                    letter-spacing:.16em;color:#fff;line-height:1}
  .navbtn{background:rgba(255,255,255,.16)}
  .navbtn:hover{background:rgba(255,255,255,.26)}
  .appbar>.glow{position:absolute;top:-120px;right:-80px;width:190px;height:190px;opacity:.24}
  .appbar>.barrow{position:relative;z-index:1}
  .iconbtn2{padding:8px;border-radius:10px;color:#fff;background:rgba(255,255,255,.1);
            display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .iconbtn2:hover{background:rgba(255,255,255,.2)}
  .barright{display:flex;gap:6px;flex-shrink:0}
  .flag{font-size:17px;line-height:1;display:block}
  .flag2{font-size:23px;line-height:1;flex-shrink:0}
  .langrow{width:100%;display:flex;align-items:center;gap:13px;padding:11px 12px;
           border-radius:12px;background:var(--card);border:1px solid var(--line);margin-bottom:7px}
  .langrow.on{border-color:var(--aqua);background:rgba(45,191,196,.09)}
  .langrow:hover{border-color:rgba(45,191,196,.5)}
  .listhead{padding:6px 20px 12px;text-align:center}
  .listhead h1{margin:0;font-family:Georgia,serif;font-size:26px;font-weight:600;
               color:#fff;letter-spacing:.01em}
  .listhead p{margin:5px 0 0;font-size:13px;color:rgba(207,243,239,.8);line-height:1.5}
  .listtools{padding:0 16px 12px;display:flex;align-items:center;gap:10px}
  .addbtn{display:inline-flex;align-items:center;gap:7px;padding:11px 18px;border-radius:999px;
          font-weight:700;font-size:14px;background:var(--aqua);color:#04262D;
          border:1px solid var(--lumin-soft);
          box-shadow:0 4px 16px -6px rgba(45,191,196,.6), inset 0 0 0 1px rgba(127,231,168,.25);
          flex-shrink:0}
  .addbtn:hover{background:#26A8AD}
  .sortbtn{width:100%;display:flex;align-items:center;gap:9px;padding:11px 14px;
           border-radius:14px;background:var(--card);border:1px solid var(--line);
           font-size:13.5px;font-weight:600;color:var(--ink);
           box-shadow:var(--cardglow)}
  .sortbtn:hover{border-color:rgba(45,191,196,.5)}
  .toolicon{flex-shrink:0;display:flex;align-items:center;justify-content:center;
            width:42px;height:42px;border-radius:14px;background:var(--card);
            border:var(--lumtrim);color:var(--ink);box-shadow:var(--cardglow)}
  .toolicon.on{background:rgba(45,191,196,.16);border-color:var(--aqua);color:var(--aqua)}
  .refinebar{padding:0 16px 12px;display:flex;flex-direction:column;gap:10px;
             animation:fade .22s ease both}
  .searchwrap{display:flex;align-items:center;gap:9px;padding:0 12px;border-radius:14px;
              background:var(--card);border:var(--lumtrim);box-shadow:var(--cardglow);color:var(--faint)}
  .searchinp{flex:1;background:transparent;border:none;outline:none;padding:12px 0;
             font-size:14px;color:var(--ink);font-family:inherit}
  .searchinp::placeholder{color:var(--faint)}
  .searchclear{padding:6px;color:var(--faint);display:flex}
  .catfilter{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
  .catfilter::-webkit-scrollbar{display:none}
  .catchip{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;padding:8px 13px;
           border-radius:999px;font-size:12.5px;font-weight:600;color:var(--muted);
           background:var(--card);border:var(--lumtrim);white-space:nowrap}
  .catchip.on{background:var(--aqua);color:#04262D;border-color:var(--aqua);
              box-shadow:0 0 16px -4px rgba(45,191,196,.7)}
  .listfoot{padding:6px 16px 24px;display:flex;justify-content:center}
  .pdfbtn{display:inline-flex;align-items:center;gap:9px;padding:12px 20px;border-radius:999px;
          font-size:13.5px;font-weight:600;color:var(--ink);background:var(--card);
          border:var(--lumtrim);box-shadow:var(--cardglow);backdrop-filter:blur(8px)}
  .pdfbtn:hover{border-color:var(--aqua);color:var(--aqua)}
  .pagetitle{margin:10px 16px 12px;padding:15px 17px;background:var(--card);
             border-radius:18px;border:1px solid var(--line);
             box-shadow:var(--cardglow)}

  .pagetitle h1{margin:0;font-family:Georgia,serif;font-size:24px;font-weight:600;color:var(--ink)}
  .pagetitle p{margin:3px 0 0;font-size:13.5px;color:var(--muted);line-height:1.5}

  /* nav drawer */
  .navscrim{position:absolute;inset:0;background:rgba(10,46,54,.55);z-index:60;
            display:flex;flex-direction:column;animation:fade .16s ease both}
  .navpanel{background:var(--deep);border-radius:0 0 22px 22px;padding:10px 12px 16px;
            box-shadow:0 18px 40px -12px rgba(0,0,0,.5)}
  .navitem{width:100%;display:flex;align-items:center;gap:13px;padding:13px 14px;
           border-radius:12px;color:#fff;text-align:left;font-size:15px;font-weight:600}
  .navitem:hover{background:rgba(255,255,255,.09)}
  .navitem.on{background:rgba(45,191,196,.22)}
  .navitem .sub{display:block;font-size:12px;font-weight:400;color:rgba(255,255,255,.5);margin-top:1px}
  .navsep{height:1px;background:rgba(255,255,255,.12);margin:8px 12px}

  /* listing */
  .lrow{width:100%;display:flex;align-items:center;gap:12px;padding:13px;border-radius:16px;
        background:var(--card);border:var(--lumtrim);backdrop-filter:blur(8px);text-align:left;margin-bottom:8px;
        box-shadow:var(--cardglow)}
  .lrow:hover{border-color:rgba(45,191,196,.45)}
  .lrow .desc{display:block;font-size:12.5px;color:var(--lumin-text);margin-top:2px;font-weight:500;
              overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pill{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;
        padding:2px 7px;border-radius:999px;margin-top:4px}
  .cright{flex-shrink:0;display:flex;align-items:center;gap:5px}
  .crightcol{display:flex;flex-direction:column;align-items:flex-end}
  .costtag{font-size:16px;font-weight:600;line-height:1.05;letter-spacing:-.01em}
  .costper{font-size:10px;font-weight:600;color:var(--faint);margin-left:1px}
  .cdate{display:block;font-size:11px;color:var(--muted);margin-top:3px;
         font-variant-numeric:tabular-nums}

  /* payment */
  .paycard{background:var(--card);border-radius:16px;padding:16px;border:var(--lumtrim);backdrop-filter:blur(8px);
           box-shadow:var(--cardglow)}
  .payrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .securenote{display:flex;align-items:center;gap:8px;justify-content:center;
              font-size:12px;color:var(--muted);margin-top:12px}

  /* profile */
  .mcard{border-radius:16px;padding:18px;position:relative;overflow:hidden}
  .mcard.active{background:var(--deep);color:#fff}
  .mcard.lapsed{background:var(--card);border:1px solid rgba(217,102,61,.3)}
  .kv{display:flex;justify-content:space-between;align-items:center;padding:11px 0;
      border-bottom:1px solid var(--line)}
  .kv:last-child{border-bottom:none}
  .kv dt{font-size:13.5px;color:var(--muted)}
  .kv dd{margin:0;font-size:13.5px;font-weight:600;color:var(--ink);text-align:right;
         overflow:hidden;text-overflow:ellipsis;max-width:60%}

  /* mission */
  .mission-hero{background:var(--card);margin:10px 16px 14px;padding:20px 18px;
                border-radius:18px;border:var(--lumtrim);backdrop-filter:blur(8px);position:relative;
                overflow:hidden;box-shadow:var(--cardglow)}
  .mission-hero>*{position:relative}
  .mission-hero>.glow{position:absolute}
  .mission-hero h2{margin:12px 0 0;font-family:Georgia,serif;font-size:22px;line-height:1.2;color:var(--ink)}
  .mission-hero p{margin:8px 0 0;font-size:13.5px;color:var(--muted);line-height:1.55}
  .vcard{background:var(--card);border-radius:16px;padding:15px;margin-bottom:10px;
         border:var(--lumtrim);box-shadow:var(--cardglow);backdrop-filter:blur(8px)}
  .vcard h3{margin:0;font-size:14.5px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:9px}
  .vcard p{margin:7px 0 0;font-size:13px;color:var(--muted);line-height:1.55}
  .missionstatement{padding:18px 17px}

function rowToItem(r){
  return {
    id: r.id,

    category: r.category || "personal",

/* Map a UI item -> database columns */
function itemToRow(it, userId){
  return {
    user_id: userId,
    name: it.name,
    category: it.category || "personal",
    cost: (it.cost === null || it.cost === undefined || isNaN(it.cost)) ? null : it.cost,

  if (!sb){ cb("offline"); return; }
  sb.auth.signInWithOtp({

  }).then(function(res){
    cb(res.error ? (res.error.message || "error") : null);

}

function loadContracts(cb){
  if (!sb || !S.user){ cb([]); return; }
  sb.from("contracts").select("*").order("end_date",{ascending:true})
    .then(function(res){
      if (res.error){ cb([]); return; }
      cb((res.data||[]).map(rowToItem));
    }).catch(function(){ cb([]); });
}

/* Insert a new contract; calls back with the saved item (incl. real id) */
function insertContract(item, cb){
  if (!sb || !S.user){ cb(null); return; }
  sb.from("contracts").insert(itemToRow(item, S.user.id)).select().single()
    .then(function(res){ cb(res.error ? null : rowToItem(res.data)); })
    .catch(function(){ cb(null); });
}

  if (!sb || !S.user){ cb(false); return; }
  sb.from("contracts").update(itemToRow(item, S.user.id)).eq("id", id)
    .then(function(res){ cb(!res.error); })
    .catch(function(){ cb(false); });
}

function deleteContract(id, cb){

  e.preventDefault();

});

function icon(name, size, color){
  size = size || 24;
  var kids = [];
  (ICONS[name] || []).forEach(function(d){
    kids.push(h("path",{d:d}));
  });
  (ICONS[name+"C"] || []).forEach(function(c){
    kids.push(h("circle",{cx:c[0],cy:c[1],r:c[2],fill:name==="tag"?"currentColor":"none"}));
  });
  (ICONS[name+"R"] || []).forEach(function(r){
    kids.push(h("rect",{x:r[0],y:r[1],width:r[2],height:r[3],rx:r[4]}));
  });
  var s = h("svg",{
    width:size, height:size, viewBox:"0 0 24 24", fill:"none",
    stroke:color||"currentColor","stroke-width":2,
    "stroke-linecap":"round","stroke-linejoin":"round"
  }, kids);
  return s;
}

/* Lapse logo mark — geometry from a least-squares circle fit to the
   supplied app icon (centre 64,64, mid-radius 45.45, stroke 14.5).
   Note: measuring the bounding box instead gives a misleading radius of
   ~63, because the round end-caps push the box out past the true circle.
   Gap of 31.5 deg at the top right; the mint dot floats free inside it
   with no dark notch behind it. */
var MARK_N = 0;
function mark(size){
  size = size || 32;
  var gid = "lapseGrad" + (++MARK_N);
  return h("svg",{width:size,height:size,viewBox:"0 0 128 128",fill:"none"},[
    h("defs",{},[
      h("linearGradient",{id:gid,x1:"104",y1:"24",x2:"28",y2:"100",
                          gradientUnits:"userSpaceOnUse"},[
        h("stop",{offset:"0","stop-color":"#5EE7D0"}),
        h("stop",{offset:"0.45","stop-color":"#2DBFC4"}),
        h("stop",{offset:"1","stop-color":"#1B7F87"})
      ])
    ]),
    h("path",{d:"M103.64 41.76 A45.45 45.45 0 1 1 86.17 24.33",
      stroke:"url(#"+gid+")","stroke-width":"14.5",
      "stroke-linecap":"round",fill:"none"}),

/* Membership has expired if it was cancelled and the paid-up date has passed */
function membershipLapsed(){
  if (!S.membership) return false;
  if (!S.membership.cancelled) return false;
  return daysUntil(S.membership.expires) < 0;
}
function hasActiveMembership(){
  return !!S.membership && !membershipLapsed();
}

/* Stripe Checkout stands in for the payment page. In the real build this
   redirects to Stripe and returns via webhook; here it completes straight
   away so the flow can be walked through. */
function goCheckout(plan){
  /* Real Stripe checkout. Calls our Netlify function, which creates a
     Stripe Checkout session and returns its URL; we then send the user
     to Stripe to pay. After payment Stripe returns them to /?paid=1 and
     the webhook flips their profile to subscribed. */
  S.pick = plan || S.pick;
  if (S.checkoutBusy) return;
  S.checkoutBusy = true;
  render();

  fetch("/.netlify/functions/create-checkout", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      plan: S.pick,
      email: S.user ? S.user.email : S.authEmail,
      userId: S.user ? S.user.id : "",
      origin: window.location.origin
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(res){
    if (res && res.url){
      window.location.href = res.url;   // off to Stripe
    } else {
      S.checkoutBusy = false;
      render();
      ping((res && res.error) ? res.error : "Couldn't start checkout — try again");
    }
  })
  .catch(function(){
    S.checkoutBusy = false;
    render();
    ping("Couldn't reach the payment server — check connection");
  });
}

function trialFull(){ return S.trial && S.items.length >= FREE_LIMIT; }
function canAdd(){

function daysUntil(iso){
  var t = new Date(iso);
  if (isNaN(t.getTime())) return 0;
  return Math.round((t - new Date(TODAY.toDateString()))/86400000);
}
function fmtDate(iso){
  /* Guard against null/empty: new Date(null) is 1 Jan 1970, which would
     display as a real (and very wrong) date. */
  if (iso === null || iso === undefined || iso === "") return "—";
  var d = new Date(iso);
  if (isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
}
function fmtMoney(p){
  if (p === null || p === undefined || isNaN(p)) return null;
  return "£"+(p/100).toFixed(2);
}
/* Which date the countdown runs to: for a monthly contract that's the
   end-of-contract date (falling back to the expiry field if it's blank);
   otherwise the expiry/renewal date itself. */
/* The end-of-contract date is the single date every contract counts down
   to. Older items may still carry a `due` field; fall back to it so they
   don't break. */
function keyDate(item){
  return item.endDate || item.due || "";
}
function ordinal(n){
  var s=["th","st","nd","rd"], v=n%100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}
function statusOf(iso){
  var d = daysUntil(iso);
  if (d < 0)   return {text:"#B44F2C", bg:"rgba(217,102,61,.12)",  bar:"#D9663D", ring:"rgba(217,102,61,.25)"};
  if (d <= 30) return {text:"#A8781F", bg:"rgba(224,169,59,.14)",  bar:"#E0A93B", ring:"rgba(224,169,59,.3)"};
  return              {text:"#1B7F87", bg:"rgba(45,191,196,.12)",  bar:"#2DBFC4", ring:"rgba(45,191,196,.25)"};
}
/* Sort modes for the renewals list. Items with no cost entered sink to
   the bottom of the cost sort rather than being treated as £0, which
   would push them above genuinely cheap entries. */
var SORTS = [
  {id:"soonest", label:"Soonest"},
  {id:"latest",  label:"Latest"},
  {id:"cost",    label:"Cost"}
];
function sortLabel(){
  for (var i=0;i<SORTS.length;i++){ if (SORTS[i].id===S.sort) return SORTS[i].label; }
  return SORTS[0].label;
}
function sortedItems(){
  var list = S.items.slice();

  /* filter by category and search text before sorting */
  if (S.catFilter && S.catFilter !== "all"){
    list = list.filter(function(i){ return i.category === S.catFilter; });
  }
  var q = (S.search || "").trim().toLowerCase();
  if (q){
    list = list.filter(function(i){
      return (i.name||"").toLowerCase().indexOf(q) > -1
          || (i.provider||"").toLowerCase().indexOf(q) > -1
          || (i.notes||"").toLowerCase().indexOf(q) > -1;
    });
  }
  if (S.sort === "latest"){
    list.sort(function(a,b){ return new Date(keyDate(b)) - new Date(keyDate(a)); });
  } else if (S.sort === "cost"){
    list.sort(function(a,b){
      var ac = (a.cost === null || a.cost === undefined) ? -1 : a.cost;
      var bc = (b.cost === null || b.cost === undefined) ? -1 : b.cost;
      if (ac === bc) return new Date(keyDate(a)) - new Date(keyDate(b));
      return bc - ac;
    });
  } else {
    list.sort(function(a,b){ return new Date(keyDate(a)) - new Date(keyDate(b)); });
  }
  return list;
}
function isEmail(v){
  var s = String(v || "").trim();
  if (!s || s.length > 254) return false;
  if (s.indexOf("..") > -1) return false;
  var re = /^[A-Za-z0-9!#$%&'*+/=?^_`{|}~-]+(?:\.[A-Za-z0-9!#$%&'*+/=?^_`{|}~-]+)*@(?:[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?\.)+[A-Za-z]{2,}$/;
  return re.test(s);
}

/* Monthly-equivalent cost of one contract: monthly as-is, yearly / 12,
   one-off contributes nothing to a recurring monthly figure. */
function monthlyCost(item){
  if (item.cost === null || item.cost === undefined) return 0;
  if (item.occurrence === "monthly") return item.cost;
  if (item.occurrence === "yearly")  return item.cost / 12;
  return 0;
}
/* Whole months from today until an item's end date (min 0). */
function monthsUntil(item){
  var end = new Date(keyDate(item));
  if (isNaN(end.getTime())) return 0;
  var now = new Date(TODAY.toDateString());
  var m = (end.getFullYear()-now.getFullYear())*12 + (end.getMonth()-now.getMonth());
  return Math.max(0, m);
}

/* Build a themed, print-ready page and open the browser's print dialog,
   from which the user can Save as PDF. No libraries, no network. */
function downloadPdf(){
  var items = sortedItems();
  var totalMonthly = 0;

  var rows = items.map(function(it){
    var mc = monthlyCost(it);
    totalMonthly += mc;
    var occ = it.occurrence==="monthly" ? "Monthly" : it.occurrence==="yearly" ? "Yearly" : "One-off";
    var pay = it.occurrence==="monthly" && it.payDay ? ordinal(it.payDay) : "—";
    return "<tr>"
      + "<td class='nm'>"+esc(it.name)+"<span>"+esc(CAT(it.category).label)+"</span></td>"
      + "<td>"+occ+"</td>"
      + "<td>"+pay+"</td>"
      + "<td>"+fmtDate(keyDate(it))+"</td>"
      + "<td class='num'>"+(fmtMoney(it.cost)||"—")+"</td>"
      + "<td class='num'>"+(mc?("£"+(mc/100).toFixed(2)):"—")+"</td>"

  var today = new Date(TODAY).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
  var html = ""
    + "<!doctype html><html><head><meta charset='utf-8'><title>Lapse — Contracts</title>"
    + "<style>"
    + "@page{margin:18mm 14mm;}"
    + "*{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}"
    + "body{font-family:Georgia,'Times New Roman',serif;color:#E8F6F5;background:#0B2A31;margin:0;padding:26px 30px;}"

    + ".logo{width:34px;height:34px;flex:none;}"

    + ".sub{font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#8FF0B6;margin:3px 0 0;letter-spacing:.04em;}"
    + ".cards{display:flex;gap:14px;margin-bottom:22px;}"
    + ".card{flex:1;border:1px solid rgba(143,240,182,.35);border-radius:12px;padding:14px 16px;background:rgba(18,52,60,.6);}"
    + ".card .k{font-family:Arial,Helvetica,sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:#8FF0B6;margin:0;}"
    + ".card .v{font-size:24px;font-weight:700;margin:6px 0 0;color:#fff;}"
    + ".card .n{font-family:Arial,Helvetica,sans-serif;font-size:10px;color:rgba(232,246,245,.7);margin:4px 0 0;line-height:1.4;}"
    + "table{width:100%;border-collapse:collapse;font-family:Arial,Helvetica,sans-serif;font-size:11.5px;}"
    + "th{text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;color:#8FF0B6;"
    + "border-bottom:1px solid rgba(143,240,182,.35);padding:0 8px 8px;}"
    + "th.num,td.num{text-align:right;}"
    + "td{padding:11px 8px;border-bottom:1px solid rgba(143,240,182,.14);color:#E8F6F5;vertical-align:top;}"
    + "td.nm{font-weight:700;}td.nm span{display:block;font-weight:400;font-size:9.5px;color:#8FF0B6;margin-top:2px;letter-spacing:.06em;text-transform:uppercase;}"
    + "tfoot td{border-top:1px solid rgba(143,240,182,.35);border-bottom:none;font-weight:700;padding-top:12px;}"
    + ".ft{font-family:Arial,Helvetica,sans-serif;font-size:9.5px;color:rgba(232,246,245,.55);margin-top:24px;text-align:center;letter-spacing:.04em;}"
    + "</style></head><body>"
    + "<div class='hd'>"+markSvg(34)+"<div><p class='ttl'>LAPSE</p><p class='sub'>Contract summary · "+today+"</p></div></div>"
    + "<div class='cards'>"
    + "<div class='card'><p class='k'>Total monthly cost</p><p class='v'>£"+(totalMonthly/100).toFixed(2)+"</p>"
    + "<p class='n'>Your recurring outgoings per month across all contracts (yearly costs spread over 12, one-offs excluded).</p></div>"
    + "</div>"
    + "<table><thead><tr>"
    + "<th>Contract</th><th>Occurrence</th><th>Pay day</th><th>End date</th><th class='num'>Cost</th><th class='num'>Per month</th>"
    + "</tr></thead><tbody>"+rows+"</tbody>"
    + "<tfoot><tr><td colspan='5'>Total monthly</td><td class='num'>£"+(totalMonthly/100).toFixed(2)+"</td></tr></tfoot>"
    + "</table>"

  var w = window.open("", "_blank");

function listRow(item){
  var kd = keyDate(item);
  var s = statusOf(kd), d = daysUntil(kd), expired = d < 0;

  /* sub-line leads with the occurrence + payment info, then the note */
  var occText = "";
  if (item.occurrence === "monthly"){
    occText = "Monthly" + (item.payDay ? " · "+ordinal(item.payDay) : "");
  } else if (item.occurrence === "yearly"){
    occText = "Yearly";
  } else if (item.occurrence === "oneoff"){
    occText = "One-off";
  }
  var note = item.notes && item.notes.trim() ? item.notes.trim()
           : (item.provider ? item.provider : CAT(item.category).label);
  var sub = occText ? occText + " · " + note : note;

  var pill = h("span",{class:"pill",style:"background:"+s.bg+";color:"+s.text},[
    expired ? "Expired "+Math.abs(d)+(Math.abs(d)===1?" day":" days")+" ago"
            : (d===0 ? "Due today" : "In "+d+(d===1?" day":" days"))
  ]);

  var right = [];
  var costStr = fmtMoney(item.cost);
  if (costStr){
    var per = item.occurrence==="monthly" ? "/mo" : (item.occurrence==="yearly" ? "/yr" : "");
    right.push(h("b",{class:"serif costtag",style:"color:"+s.text},
      [ costStr, per ? h("span",{class:"costper"},[per]) : null ]));
  }
  right.push(h("span",{class:"cdate"},[fmtDate(kd)]));
  if (item.files && item.files.length){
    right.push(h("span",{style:"display:flex;align-items:center;gap:3px;justify-content:flex-end;font-size:10.5px;color:var(--faint);margin-top:2px"},
      [icon("clip",11), String(item.files.length)]));
  }

  return h("button",{class:"lrow",onclick:function(){ openItem(item); }},[
    h("span",{class:"bar",style:"background:"+s.bar}),
    h("span",{class:"cico",style:"background:"+s.bg+";color:"+s.text},[icon(CAT(item.category).ic,16)]),
    h("span",{class:"cmid"},[
      h("span",{class:"cname"},[item.name]),
      h("span",{class:"desc lumin"},[sub]),
      pill
    ]),
    h("span",{class:"cright"},[
      h("span",{class:"crightcol"},right),
      icon("chevron",15,"var(--faint)")
    ])
  ]);
}

/* ---------- render ---------- */
function render(){
  var app = document.getElementById("app");
  app.innerHTML = "";
  var kids;

  if (S.stage === "loading"){
    kids = viewLoading();
  } else if (S.stage === "pricing"){
    kids = viewPricing();
  } else if (!S.user){
    kids = viewWelcome();
  } else if (S.screen === "edit"){
    kids = viewEdit();
  } else if (S.screen === "detail"){
    kids = viewDetail();
  } else if (S.screen === "profile"){
    kids = viewProfile();
  } else if (S.screen === "mission"){
    kids = viewMission();
  } else {
    kids = viewListing();
  }

  kids.forEach(function(k){ if(k) app.appendChild(k); });

  if (S.menu && S.user && S.stage === "app") app.appendChild(viewNav());
  if (S.langPicker) app.appendChild(viewLangPicker());
  if (S.sortPicker && S.user) app.appendChild(viewSortPicker());
  if (S.paywall && S.user) app.appendChild(viewPaywall());
  if (S.installPrompt && S.user && S.stage === "app") app.appendChild(viewInstallPrompt());
  if (S.iosInstall) app.appendChild(viewIosInstall());

  if (S.toast){
    app.appendChild(h("div",{class:"toast fade"},[icon("check",15,"#5EE7D0"), S.toast]));
  }
}

/* ---- Boot: check for a logged-in session, then show the right screen ----
   If Supabase has a session (either already stored, or just created by a
   magic-link click), we load the user's contracts and go to the app.
   Otherwise we show the welcome/login screen. */
S.seenInstall = true;
S.stage = "loading";
render();

function enterApp(user){
  S.user = { id: user.id, email: user.email };
  S.authEmail = user.email;
  loadProfile(function(profile){
    S.membership = (profile && profile.subscribed)
      ? { plan: profile.plan || "monthly", since: profile.created_at || null, renews: profile.current_period_end || null, cancelled:false, expires:null }
      : null;
    loadContracts(function(items){
      S.items = items;
      S.everHadItems = items.length > 0;
      S.plan = (profile && profile.subscribed) ? "pro" : "free";
      S.trial = !(profile && profile.subscribed);
      S.stage = "app";
      S.screen = "listing";
      S.installPrompt = false;
      render();

      /* Just returned from a successful Stripe checkout? The webhook may
         take a second or two to flip the profile, so poll a few times. */
      if (/[?&]paid=1/.test(window.location.search) && !(profile && profile.subscribed)){
        confirmPayment(0);
      }
      /* Clean the ?paid / ?canceled off the URL so refreshes are tidy */
      if (window.history && window.history.replaceState && /[?]/.test(window.location.search)){
        try { window.history.replaceState({}, "", window.location.pathname); } catch(e){}
      }
      if (/[?&]canceled=1/.test(window.location.search)){
        ping("Checkout canceled — no charge made");
      }
    });
  });
}

/* Poll the profile a few times after returning from Stripe, until the
   webhook has marked the account subscribed. */
function confirmPayment(attempt){
  if (attempt === 0) ping("Confirming your payment…");
  loadProfile(function(profile){
    if (profile && profile.subscribed){
      S.membership = { plan: profile.plan || "monthly", since: profile.created_at || null,
        renews: profile.current_period_end || null, cancelled:false, expires:null };
      S.plan = "pro"; S.trial = false;
      render();
      ping("You're subscribed — thank you!");
    } else if (attempt < 6){
      setTimeout(function(){ confirmPayment(attempt+1); }, 2000);
    } else {
      ping("Payment received — it may take a moment to update.");
    }
  });
}

function showWelcome(){
  S.user = null;
  S.stage = "welcome";
  S.screen = "listing";
  render();
}

if (sb){
  sb.auth.getSession().then(function(res){
    var session = res && res.data && res.data.session;
    if (session && session.user){ enterApp(session.user); }
    else { showWelcome(); }
  }).catch(showWelcome);

  /* When a magic link is clicked, Supabase fires SIGNED_IN */
  sb.auth.onAuthStateChange(function(event, session){
    if (event === "SIGNED_IN" && session && session.user){
      if (S.stage !== "app") enterApp(session.user);
    }
    if (event === "SIGNED_OUT"){ showWelcome(); }
  });
} else {
  /* Library failed to load (offline / blocked) — show welcome with a notice */
  S.stage = "welcome";
  render();
}
